role_key: inside_forward
display_name: Inside Forward
position_group: ATT
eligible_positions: [LW, RW, CF]
description: >
  Starts from wide but attacks central spaces and the goal. Judged on shot threat,
  central/box entries, shot creation, and finishing rather than touchline isolation.

metric_groups:
  shot_threat:
    weight: 0.25
    metrics:
      - { name: non_penalty_xg_per90, direction: higher_better, weight: 0.6 }
      - { name: shots_per90, direction: higher_better, weight: 0.4 }
  central_entries:
    weight: 0.20
    metrics:
      - { name: carries_into_penalty_area_per90, direction: higher_better }
  shot_creation:
    weight: 0.15
    metrics:
      - { name: shot_creating_actions_per90, direction: higher_better }
  box_presence:
    weight: 0.15
    metrics:
      - { name: touches_in_box_per90, direction: higher_better }
  finishing_confidence:
    weight: 0.10
    metrics:
      - { name: goals_minus_xg_per90, direction: higher_better }
  possession_security:
    weight: 0.10
    metrics:
      - { name: dispossessed_per90, direction: lower_better, weight: 0.5 }
      - { name: miscontrols_per90, direction: lower_better, weight: 0.5 }
  defensive_contribution:
    weight: 0.05
    metrics:
      - { name: pressures_per90, direction: higher_better }

required_metrics: [non_penalty_xg_per90, shots_per90, touches_in_box_per90]
optional_metrics: [goals_minus_xg_per90, shot_creating_actions_per90]

confidence_rules:
  min_minutes: 450
  full_confidence_minutes: 1800
  required_coverage: 0.6

concern_rules:
  - { key: raw_finishing, metric: goals_minus_xg_per90, direction: lower_worse, percentile_threshold: 0.25, penalty: 1.5 }
  - { key: turnover_risk, metric: dispossessed_per90, direction: higher_worse, percentile_threshold: 0.80, penalty: 1.5 }
