name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHONPATH: packages:packages/rating_engine:packages/shared/python:apps/api

jobs:
  python-quality:
    name: Python ${{ matrix.python-version }} quality and tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install development dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install -e ".[dev]"
      - name: Ruff
        run: .venv/bin/ruff check .
      - name: Black formatting
        run: .venv/bin/black --check .
      - name: Tests and coverage
        run: >-
          .venv/bin/pytest
          --cov=app
          --cov=data_pipeline
          --cov=market_model
          --cov=rolefit
          --cov=scoutboy_shared
          --cov-report=term-missing
          --cov-report=xml
          --cov-fail-under=90
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-${{ matrix.python-version }}-coverage
          path: coverage.xml
          if-no-files-found: warn

  frontend-quality:
    name: Frontend quality, tests, and production build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Enable pinned pnpm
        run: corepack enable
      - name: Locate pnpm store
        id: pnpm-cache
        run: echo "store-path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"
      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store-path }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm --filter @scoutboy/web lint
      - name: Typecheck
        run: pnpm --filter @scoutboy/web typecheck
      - name: Unit tests
        run: pnpm --filter @scoutboy/web test run
      - name: Production build
        run: pnpm --filter @scoutboy/web build

  api-contract:
    name: API contract freshness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Enable pinned pnpm
        run: corepack enable
      - name: Locate pnpm store
        id: pnpm-cache
        run: echo "store-path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"
      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store-path }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-
      - name: Install generators
        run: |
          python -m venv .venv
          .venv/bin/pip install -e .
          pnpm install --frozen-lockfile
      - name: Check generated contracts
        run: make check-api-contract
      - name: Verify no tracked contract changes remain
        run: git diff --exit-code -- docs/api_contracts/openapi.json apps/web/src/lib/api/schema.gen.ts

  postgres-integration:
    name: PostgreSQL migration, pipeline, and API smoke
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: scoutboy
          POSTGRES_PASSWORD: scoutboy
          POSTGRES_DB: scoutboy_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U scoutboy -d scoutboy_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg://scoutboy:scoutboy@localhost:5432/scoutboy_test
      SCOUTBOY_ENVIRONMENT: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install PostgreSQL and test dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install -e ".[dev,postgres]"
      - name: Migrate from base to head
        run: .venv/bin/alembic upgrade head
      - name: Ingest deterministic sample
        run: .venv/bin/python -m data_pipeline.jobs.ingest --source sample
      - name: Recompute ratings, playstyles, and market values
        run: .venv/bin/python -m data_pipeline.jobs.recompute --ratings --playstyles --market
      - name: Exercise the real PostgreSQL engine and API read path
        run: SCOUTBOY_POSTGRES_SMOKE=1 .venv/bin/pytest apps/api/app/tests/test_postgres_smoke.py

  end-to-end:
    name: Production-build Playwright critical flow
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Enable pinned pnpm
        run: corepack enable
      - name: Locate pnpm store
        id: pnpm-cache
        run: echo "store-path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"
      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store-path }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-
      - name: Install dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install -e ".[dev]"
          pnpm install --frozen-lockfile
      - name: Install Chromium
        run: pnpm exec playwright install --with-deps chromium
      - name: Run fixture-backed critical flow
        run: make e2e
      - name: Upload Playwright diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-diagnostics
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore

  container-smoke:
    name: Full-stack container build and health smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SCOUTBOY_ADMIN_TOKEN: ci-compose-validation-token
    steps:
      - uses: actions/checkout@v4
      - name: Validate Compose configuration
        run: docker compose -f docker-compose.full.yml config --quiet
      - name: Build, start, and probe the full stack
        run: make docker-smoke
