name: Security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "17 4 * * 1"

concurrency:
  group: security-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  secret-scan:
    name: Gitleaks secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  python-audit:
    name: Python dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install audit tool
        run: pip install pip-audit
      - name: Audit declared Python application dependencies
        # These seven 2026 advisories name fix releases that are not published on PyPI yet.
        # SECURITY.md records the temporary exception and removal condition.
        run: >-
          pip-audit . --strict
          --ignore-vuln PYSEC-2026-161
          --ignore-vuln PYSEC-2026-248
          --ignore-vuln PYSEC-2026-249
          --ignore-vuln PYSEC-2026-2280
          --ignore-vuln PYSEC-2026-2281
          --ignore-vuln PYSEC-2026-2132
          --ignore-vuln PYSEC-2026-2270

  javascript-audit:
    name: Production JavaScript dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Enable pinned pnpm
        run: corepack enable
      - name: Locate pnpm store
        id: pnpm-cache
        run: echo "store-path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"
      - name: Cache pnpm store
        uses: actions/cache@v6
        with:
          path: ${{ steps.pnpm-cache.outputs.store-path }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-
      - name: Install locked dependencies
        run: pnpm install --frozen-lockfile
      - name: Audit production dependencies
        run: pnpm audit --prod --audit-level high
